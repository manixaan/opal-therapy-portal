<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password — Opal Therapy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #5b6af0;
      --brand-dark: #4452d8;
      --ink:        #1a1a2e;
      --ink-soft:   #6b7280;
      --surface:    #ffffff;
      --bg:         #f4f5fb;
      --border:     #dde3ec;
      --danger:     #dc2626;
      --radius:     12px;
      --shadow:     0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--ink);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 48px; height: 48px;
      background: var(--brand);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .logo-mark svg { width: 26px; height: 26px; fill: white; }
    .logo h1 { font-size: 20px; font-weight: 700; }
    .logo p  { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }

    h2 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .sub { font-size: 13px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }
    input[type="email"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: #fff;
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus { border-color: var(--brand); }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover    { background: var(--brand-dark); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-primary.loading .spinner   { display: block; }
    .btn-primary.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg-box {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .msg-box.visible { display: block; }
    .msg-box.error   { background: #fef2f2; border: 1px solid #fca5a5; color: var(--danger); }
    .msg-box.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 24px;
    }
    .footer-note a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .footer-note a:hover { text-decoration: underline; }

    .cooldown-note {
      font-size: 12px;
      color: var(--ink-soft);
      text-align: center;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M8 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3V2h-2v2H9V2H8zm-3 6h14v10H5V8zm2 2v2h2v-2H7zm4 0v2h2v-2h-2zm4 0v2h2v-2h-2zM7 14v2h2v-2H7zm4 0v2h2v-2h-2z"/></svg>
    </div>
    <h1>Opal Therapy</h1>
    <p>Scheduling &amp; Practice Management</p>
  </div>

  <h2>Reset your password</h2>
  <p class="sub">Enter your email address and we'll send you a link to reset your password.</p>

  <div class="msg-box" id="msg-box"></div>

  <form id="forgot-form" novalidate>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
    </div>
    <button type="submit" class="btn-primary" id="submit-btn">
      <span class="btn-label">Send reset link</span>
      <span class="spinner"></span>
    </button>
  </form>

  <p class="cooldown-note" id="cooldown-note"></p>

  <p class="footer-note">
    <a href="/login">← Back to sign in</a>
  </p>
</div>

<script>
'use strict';

let cooldownUntil = 0;
let cooldownTimer = null;
let submitted = false;

document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  if (Date.now() < cooldownUntil) return;

  const btn   = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  clearMsg();

  if (!email) {
    showMsg('error', 'Please enter your email address.');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    await fetch('/api/auth/forgot-password', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email }),
    });
    // Always show generic success (enumeration-safe)
    showMsg('success', 'If an account exists for that email, a password reset link has been sent. Check your inbox — it expires in 1 hour.');
    submitted = true;
    btn.textContent = 'Sent';
    cooldownUntil = Date.now() + 3 * 60 * 1000; // 3 minutes
    startCooldown();
  } catch (_) {
    showMsg('error', 'Could not connect to the server. Please try again.');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

function startCooldown() {
  if (cooldownTimer) clearInterval(cooldownTimer);
  const note = document.getElementById('cooldown-note');
  const btn  = document.getElementById('submit-btn');

  cooldownTimer = setInterval(() => {
    const remaining = Math.ceil((cooldownUntil - Date.now()) / 1000);
    if (remaining > 0) {
      note.textContent = `You can request another link in ${remaining}s`;
      btn.disabled = true;
    } else {
      note.textContent = '';
      btn.disabled = false;
      btn.classList.remove('loading');
      if (submitted) btn.querySelector('.btn-label').textContent = 'Resend reset link';
      clearInterval(cooldownTimer);
    }
  }, 1000);
}

function showMsg(type, msg) {
  const box = document.getElementById('msg-box');
  box.className = `msg-box ${type} visible`;
  box.textContent = msg;
}
function clearMsg() {
  const box = document.getElementById('msg-box');
  box.className = 'msg-box';
  box.textContent = '';
}
</script>

</body>
</html>
